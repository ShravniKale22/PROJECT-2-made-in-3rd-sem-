<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Details</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Cart Details</h1>
    </header>

    <main>
        <div id="cart-items">
            <h2>Your Order</h2>
            <p>Your cart is empty.</p>
        </div>

        <button id="confirmOrder">Confirm Order</button>
        <div id="confirmationMessage" class="confirmation-message"></div>
    </main>

    <script>
        // Load cart data from localStorage
        function loadCart() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartData = JSON.parse(localStorage.getItem('cart')) || [];

            if (cartData.length === 0) {
                cartItemsContainer.innerHTML = '<p>Your cart is empty.</p>';
            } else {
                cartItemsContainer.innerHTML = cartData.map(item => `<p>${item.name} - ₹${item.price}</p>`).join('');
            }
        }

        // Handle order confirmation
        document.getElementById('confirmOrder').addEventListener('click', function() {
            const confirmationMessage = '<h2>Order Confirmation</h2><p>Your order has been placed!</p>';
            document.getElementById('confirmationMessage').innerHTML = confirmationMessage;
        });

        window.onload = loadCart; // Load the cart items when the page is loaded
    </script>
</body>
</html>
