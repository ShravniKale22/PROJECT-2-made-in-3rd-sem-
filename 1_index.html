<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hungry Hive</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header Section with Icons -->
    <header>
        <div class="header-left">
            <h1>HUNGRY HIVE</h1>
        </div>
        <div class="header-right">
            <a href="cart.html" class="icon"><img src="images/cart-icon.png" alt="Cart Icon"></a>
            <a href="user.html" class="icon"><img src="images/user-icon.png" alt="User Icon"></a>
        </div>
    </header>
    <!-- Main Content -->
    <main>
        <!-- Image Section -->
        <div class="image-container">
            <img src="images/food-image.jpg" alt="Food Image">
        </div>

        <!-- Subtitle for Menu -->
        <div class="subtitle">
            Menu
        </div>
        <!-- Menu Grid -->
    <div class="menu-grid">
        <!-- Repeat this block for each food item -->
        <div class="menu-item">
            <img src="images/paneer_tikka.jpg" alt="Food Item 1">
            <p>Paneer Tikka - ₹250</p>
            <button class="add-to-cart" data-item="Paneer Tikka" data-price="250">Add to Cart</button>
        </div>
        <div class="menu-item">
            <img src="images/butter_chicken.jpg" alt="Food Item 2">
            <p>Butter Chicken - ₹350</p>
            <button class="add-to-cart" data-item="butter chicken" data-price="350">Add to Cart</button>
        </div>
        <div class="menu-item">
            <img src="images/palak_paneer.jpg" alt="Food Item 3">
            <p>Palak Paneer - ₹200</p>
            <button class="add-to-cart" data-item="Palak paneer" data-price="200">Add to Cart</button>
        </div>
        <div class="menu-item">
            <img src="images/biryani.jpg" alt="Food Item 4">
            <p>Chicken Biryani - ₹300</p>
            <button class="add-to-cart" data-item="chicken biryani" data-price="300">Add to Cart</button>
        </div>
        <div class="menu-item">
            <img src="images/samosa.jpg" alt="Food Item 5">
            <p>samosa - ₹40</p>
            <button class="add-to-cart" data-item="samosa" data-price="40">Add to Cart</button>
        </div>
        <div class="menu-item">
            <img src="images/chole_bhature.jpg" alt="Food Item 6">
            <p>Chole Bhature - ₹220</p>
            <button class="add-to-cart" data-item="chole bhature" data-price="220">Add to Cart</button>
        </div>
        <div class="menu-item">
            <img src="images/naan.jpg" alt="Food Item 7">
            <p>naan - ₹80</p>
            <button class="add-to-cart" data-item="naan" data-price="80">Add to Cart</button>
        </div>
        <div class="menu-item">
            <img src="images/rajma_chawal.jpg" alt="Food Item 8">
            <p>rajma chawal - ₹275</p>
            <button class="add-to-cart" data-item="rajma chawal" data-price="275">Add to Cart</button>
        </div>
        <div class="menu-item">
            <img src="images/idli.jpg" alt="Food Item 9">
            <p>idli - ₹60</p>
            <button class="add-to-cart" data-item="idli" data-price="60">Add to Cart</button>
        </div>
        <div class="menu-item">
            <img src="images/dosa.jpg" alt="Food Item 10">
            <p>dosa- ₹100</p>
            <button class="add-to-cart" data-item="dosa" data-price="100">Add to Cart</button>
        </div>
    </div>

    <!-- Subtitle for Beverages -->
    <div class="subtitle">
        Beverages
    </div>

    <!-- Beverages Grid -->
    <div class="beverages-grid">
        <!-- Beverage Items -->
        <div class="beverage-item">
            <img src="images/coca_cola.jpg" alt="Drink 1">
            <p>Coca cola - ₹60</p>
            <button class="add-to-cart" data-item="coca cola" data-price="60">Add to Cart</button>
        </div>
        <div class="beverage-item">
            <img src="images/sprite.jpg" alt="Drink 2">
            <p>sprite - ₹60</p>
            <button class="add-to-cart" data-item="sprite" data-price="60">Add to Cart</button>
        </div>
        <div class="beverage-item">
            <img src="images/lassi.jpg" alt="Drink 3">
            <p>lassi- ₹60</p>
            <button class="add-to-cart" data-item="lassi" data-price="60">Add to Cart</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
